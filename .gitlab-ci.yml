# CI/CD pipeline for ustriy-system monorepo
#
# Stages run in parallel via GitLab DAG (needs: []).
# Deploy runs only on push to main, after all quality gates pass.
#
# Required CI/CD variables (Settings → CI/CD → Variables, all Protected + Masked):
#   SSH_PRIVATE_KEY  — ed25519 private key for the deploy user on VPS
#   SSH_KNOWN_HOSTS  — output of: ssh-keyscan -H $SSH_HOST
#   SSH_HOST         — VPS IP or domain
#   SSH_USER         — deploy user on VPS (not root)
#   DEPLOY_PATH      — absolute path to the repo clone on VPS (e.g. /opt/ustriy-system)
#   DEPLOY_DOMAIN    — domain shown in GitLab Environments (optional)

workflow:
  rules:
    # MR pipelines take priority — run as merge_request_event
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    # Suppress duplicate branch pipeline when an MR is open
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
      when: never
    # Normal branch push pipeline
    - if: $CI_COMMIT_BRANCH

stages:
  - lint
  - test
  - build
  - deploy

# ── Cache anchors ────────────────────────────────────────────────────────────

.cache_root: &cache_root
  key:
    files:
      - package-lock.json
  paths:
    - node_modules/
  policy: pull-push

.cache_backend: &cache_backend
  key:
    files:
      - apps/backend/package-lock.json
  paths:
    - apps/backend/node_modules/
  policy: pull-push

.cache_frontend: &cache_frontend
  key:
    files:
      - apps/frontend/package-lock.json
  paths:
    - apps/frontend/node_modules/
  policy: pull-push

# ── Stage: lint ──────────────────────────────────────────────────────────────

lint:
  stage: lint
  image: node:20-alpine
  needs: []
  cache:
    - <<: *cache_root
    - <<: *cache_backend
    - <<: *cache_frontend
  script:
    # All three node_modules required: root ESLint uses projectService: true
    # (type-aware rules) which needs both apps' tsconfigs and their @types.
    - npm ci --prefer-offline --no-audit
    - npm ci --prefer-offline --no-audit --prefix apps/backend
    - npm ci --prefer-offline --no-audit --prefix apps/frontend
    - npm run lint
    - npm run format:check

# ── Stage: typecheck ─────────────────────────────────────────────────────────

typecheck:backend:
  stage: lint
  image: node:20-alpine
  needs: []
  cache:
    - <<: *cache_backend
  script:
    - npm ci --prefer-offline --no-audit --prefix apps/backend
    - npm run type-check --prefix apps/backend

typecheck:frontend:
  stage: lint
  image: node:20-alpine
  needs: []
  cache:
    - <<: *cache_frontend
  script:
    - npm ci --prefer-offline --no-audit --prefix apps/frontend
    - npm run type-check --prefix apps/frontend

# ── Stage: test ──────────────────────────────────────────────────────────────

test:backend:
  stage: test
  image: node:20-alpine
  needs: []
  cache:
    - <<: *cache_backend
  script:
    - npm ci --prefer-offline --no-audit --prefix apps/backend
    - npm test --prefix apps/backend

# ── Stage: build ─────────────────────────────────────────────────────────────

build:backend:
  stage: build
  image: node:20-alpine
  needs: []
  cache:
    - <<: *cache_backend
  script:
    - npm ci --prefer-offline --no-audit --prefix apps/backend
    - npm run build --prefix apps/backend
  artifacts:
    paths:
      - apps/backend/dist/
    expire_in: 1 week

build:frontend:
  stage: build
  image: node:20-alpine
  needs: []
  cache:
    - <<: *cache_frontend
  script:
    - npm ci --prefer-offline --no-audit --prefix apps/frontend
    - npm run build --prefix apps/frontend
  artifacts:
    paths:
      - apps/frontend/.next/
    expire_in: 1 week

# ── Stage: deploy ─────────────────────────────────────────────────────────────

deploy:
  stage: deploy
  image: alpine:3.20
  needs:
    - lint
    - typecheck:backend
    - typecheck:frontend
    - test:backend
    - build:backend
    - build:frontend
  rules:
    - if: $CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"
  environment:
    name: production
    url: https://$DEPLOY_DOMAIN
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - chmod 600 "$SSH_PRIVATE_KEY" && ssh-add "$SSH_PRIVATE_KEY"
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - cat "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts && chmod 644 ~/.ssh/known_hosts
  script:
    - |
      ssh "$SSH_USER@$SSH_HOST" "
        set -e
        cd '$DEPLOY_PATH'
        git fetch origin main
        git reset --hard origin/main
        docker compose -f docker-compose.yml up -d --build
        docker compose -f docker-compose.yml exec -T backend npm run migration:run || true
      "
