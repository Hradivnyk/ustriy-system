services:
  backend:
    build:
      target: dev
    ports:
      - '3000:3000'
    volumes:
      - ./apps/backend/src:/app/src
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=1000
    restart: "no"

  frontend:
    build:
      target: dev
    ports:
      - '3001:3001'
    volumes:
      - ./apps/frontend/src:/app/src
    environment:
      - NEXT_NO_TURBOPACK=1
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
    restart: "no"

  postgres:
    ports:
      - '5432:5432'

  redis:
    ports:
      - '6379:6379'

  # nginx та certbot вимкнено в локальному середовищі
  nginx:
    profiles:
      - production-only

  certbot:
    profiles:
      - production-only
